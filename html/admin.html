<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>admin — verifi</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="head">
  <h1 id="page-title">dashboard</h1>
  <div class="head-actions" id="head-actions"></div>
</div>

<div id="gate"></div>

<div id="auth" style="display:none">
  <div class="auth-card">
    <div class="auth-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <p class="auth-title">site dashboard</p>
    <p class="auth-sub">enter your site id and admin key to view your stats.</p>
    <div class="lookup">
      <input id="site-inp" placeholder="site id" maxlength="40" autocomplete="off">
      <input id="key-inp" placeholder="admin key" maxlength="40" autocomplete="off" type="password">
      <button class="btn" id="lookup-btn" onclick="lookupStats()">view dashboard</button>
    </div>
  </div>
</div>

<div id="sites-list"></div>

<div id="dashboard" style="display:none">
  <div class="site-header">
    <div class="site-info">
      <div class="site-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div>
        <div class="site-name" id="site-name">—</div>
        <div class="site-domain" id="site-domain">—</div>
      </div>
    </div>
    <div class="site-actions">
      <button class="btn secondary" id="export-btn" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        export csv
      </button>
    </div>
  </div>

  <div class="totals" id="totals">
    <div class="stat-card">
      <div class="stat-icon total">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="stat-num" id="total-verifications">0</div>
      <div class="stat-label">total verifications</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon pass">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="stat-num pass" id="total-passes">0</div>
      <div class="stat-label">passed</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon fail">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div class="stat-num fail" id="total-fails">0</div>
      <div class="stat-label">blocked</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon rate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="stat-num" id="pass-rate">0%</div>
      <div class="stat-label">pass rate</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card wide">
      <div class="chart-head">
        <div class="chart-title">daily verifications</div>
        <div class="chart-legend">
          <span class="legend-dot pass"></span> passed
          <span class="legend-dot fail"></span> blocked
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="daily-chart"></canvas>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-title">pass rate trend</div>
      </div>
      <div class="chart-wrap">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <div class="chart-title">overall split</div>
      </div>
      <div class="chart-wrap donut">
        <canvas id="split-chart"></canvas>
        <div class="donut-center" id="donut-center">0%</div>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div class="chart-head">
      <div class="chart-title">daily breakdown</div>
    </div>
    <table id="days-table">
      <thead><tr><th>day</th><th>passed</th><th>blocked</th><th>total</th></tr></thead>
      <tbody id="days-body"></tbody>
    </table>
  </div>
</div>

<div class="err" id="err"></div>

<script src="admin.js"></script>
</body>
</html>
